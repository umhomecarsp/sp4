<script>
document.documentElement.style.background="#0d1117";
if(document.body)document.body.style.background="#0d1117";
document.addEventListener('DOMContentLoaded',function(){if(document.body)document.body.style.background="#0d1117";});
// ฆ่า loader ให้ได้แน่ๆ หลัง 4 วิ
window.addEventListener('load',function(){
  setTimeout(function(){
    var el=document.getElementById('app-loader');
    if(el){el.style.pointerEvents='none';el.style.opacity='0';setTimeout(function(){el.remove();},400);}
  },4000);
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;--cyan:#39d353;
  --radius:8px;--shadow:0 8px 24px rgba(0,0,0,.4);
}
body.light{
  --bg:#f4f6f9;--bg2:#ffffff;--bg3:#eef0f4;--bg4:#dde1e8;
  --border:#d1d9e0;--text:#111827;--text2:#374151;--text3:#6b7280;
  --blue:#1a6fd4;--blue2:#1558b0;--green:#15803d;--red:#b91c1c;
  --yellow:#92400e;--purple:#6d28d9;--orange:#c2410c;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
/* Card & layout */
body.light .card{background:#fff;border-color:#d1d9e0;box-shadow:0 1px 4px rgba(0,0,0,.05);}
body.light .stat-card{background:#fff;border:1px solid #d1d9e0;box-shadow:0 1px 3px rgba(0,0,0,.04);}
body.light .page{background:#f4f6f9;}
/* Inputs */
body.light input,body.light select,body.light textarea{background:#fff;border-color:#b0bac5;color:#111827;}
body.light input::placeholder,body.light textarea::placeholder{color:#9ca3af;}
/* Nav */
body.light .nav-item{color:#4b5563;}
body.light .nav-item:hover{background:#eef0f4;color:#111827;}
body.light .nav-item.active{color:#1a6fd4;background:rgba(26,111,212,.1);border-left-color:#1a6fd4;}
body.light .sidebar{background:#fff;border-right:1px solid #d1d9e0;}
body.light .bottom-nav,body.light .admin-bottom-nav{background:#fff;border-top-color:#d1d9e0;}
body.light .admin-topbar{background:#fff;border-bottom-color:#d1d9e0;}
body.light .bottom-nav-item{color:#4b5563;}
body.light .bottom-nav-item.active{color:#1a6fd4;}
/* Buttons */
body.light .btn-ghost{color:#374151;border-color:#d1d9e0;background:#fff;}
body.light .btn-ghost:hover{background:#eef0f4;border-color:#b0bac5;}
/* Modal */
body.light .modal{background:#fff;border-color:#d1d9e0;box-shadow:0 8px 32px rgba(0,0,0,.12);}
body.light .modal-hd{border-bottom-color:#d1d9e0;background:#f9fafb;}
body.light .modal-ft{border-top-color:#d1d9e0;background:#f9fafb;}
/* Market cards */
body.light .mkc{background:#fff;border-color:#d1d9e0;}
body.light .mkc:hover{border-color:#1a6fd4;box-shadow:0 2px 12px rgba(26,111,212,.1);}
/* Text */
body.light .page-title{color:#111827;}
body.light label{color:#374151;}
/* Status badges — ทำให้อ่านง่ายใน light */
body.light .badge{filter:saturate(1.2) brightness(.88);}
body.light .focus-block{border-width:1.5px;}
/* Top bar */
body.light .admin-topbar .btn-ghost,body.light .sidebar .btn-ghost{color:#4b5563;}
body{background:#0d1117;color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
body.light{background:#f0f2f5 !important;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,#1f6feb,#388bfd);color:#fff;box-shadow:0 4px 14px rgba(31,111,235,.35);transition:all .2s;}
.btn-primary:hover{background:linear-gradient(135deg,#388bfd,#58a6ff);transform:translateY(-1px);box-shadow:0 6px 20px rgba(31,111,235,.5);}
.btn-danger{background:#da3633;color:#fff;}
.btn-danger:hover{background:#f85149;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-green{background:#238636;color:#fff;}
.btn-green:hover{background:#2ea043;}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:14px;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
select option{background:var(--bg3);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-bd{padding:20px;}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{background:var(--bg3);padding:10px 12px;text-align:left;color:var(--text2);font-weight:600;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.clickable{cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:12px;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-nav{flex:1;padding:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;color:var(--text2);font-size:14px;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:rgba(31,111,235,.12);color:var(--blue);border-left:3px solid var(--blue);}
.main-content{margin-left:220px;min-height:100vh;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:9999;pointer-events:auto;}
.admin-topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:9999;align-items:center;justify-content:space-between;padding:0 16px;pointer-events:auto;}
.admin-mobile-content{margin-left:220px;}
.admin-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:9999;pointer-events:auto;}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text2);font-size:11px;gap:2px;}
.bottom-nav-item.active{color:var(--blue);}

.page{padding:20px;}
.page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:700;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}
.s-wait{background:#3a3d42;color:#ffffff;border:1px solid #6e7681;}
.s-go{background:#1a4731;color:#3fb950;}
.s-nurse{background:#3d2b00;color:#ffa657;}
.s-half{background:#2d1b00;color:#d29922;}
.s-cant{background:#3d1515;color:#f85149;}
.s-later{background:#2b1f3d;color:#bc8cff;}
.s-book{background:#0d2149;color:#58a6ff;}
.s-sign{background:#0d3149;color:#39d353;}
.s-wait2{background:#1a2a3d;color:#79c0ff;}
.s-approve{background:#132d18;color:#3fb950;}
.s-close{background:#5a0a0a;color:#ff6b6b;}
.s-reject{background:#3d0a0a;color:#f85149;}
.s-release{background:#0a2418;color:#3fb950;}
.s-other{background:#2d1500;color:#ffa657;}
.s-throw{background:#3d2e00;color:#ffd700;}
.market-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.market-card:hover{border-color:var(--blue2);}
.mk-page{display:flex;flex-direction:column;min-height:100vh;}
.mk-hero{background:linear-gradient(135deg,#0d1b2a 0%,#1a2744 60%,#0f2233 100%);padding:24px 24px 0;border-bottom:1px solid var(--border);color:#e6edf3;}
.mk-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.mk-stats{display:flex;gap:4px;}
.mk-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 20px;text-align:center;min-width:90px;}
.mk-stat-num{font-size:26px;font-weight:800;line-height:1;}
.mk-stat-lbl{font-size:11px;color:rgba(230,237,243,.7);margin-top:3px;}
.mk-body{display:flex;flex:1;gap:0;}
.mk-cards-area{flex:1;padding:20px;min-width:0;}
.mk-sidebar{width:280px;flex-shrink:0;border-left:1px solid var(--border);padding:16px;background:var(--bg2);}
.mk-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.mkc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s,box-shadow .2s,transform .2s;cursor:default;animation:fadeInUp .35s cubic-bezier(.16,1,.3,1);}
.mkc:hover{border-color:var(--blue2);box-shadow:0 4px 20px rgba(31,111,235,.15);transform:translateY(-2px);}
@media(hover:none){.mkc:hover{transform:none!important;box-shadow:none!important;}}
.mkc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mkc-id{font-size:15px;font-weight:800;color:var(--blue);}
.mkc-date{font-size:11px;background:#2d2000;color:var(--yellow);padding:3px 8px;border-radius:20px;border:1px solid #4a3500;}
.mkc-name{font-size:15px;font-weight:700;margin-bottom:8px;}
.mkc-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.mkc-contact{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mkc-report{font-size:12px;color:var(--text2);background:var(--bg3);padding:8px 10px;border-radius:6px;margin-bottom:12px;line-height:1.6;max-height:72px;overflow:hidden;}
.mkc-actions{display:flex;gap:8px;}
.btn-claim{flex:1;background:var(--blue2);color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-claim:hover{background:#388bfd;transform:translateY(-1px);}
.btn-claim:disabled{background:#1a3a5c;color:#4a7ab5;cursor:not-allowed;transform:none;}
.btn-skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-skip:hover{background:var(--bg4);}
.mk-sb-section{margin-bottom:20px;}
.mk-sb-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.lb-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.sb-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;}
@media(max-width:900px){.mk-sidebar{display:none;}}
@media(max-width:600px){.mk-cards-grid{grid-template-columns:1fr;}.mk-hero{padding:16px 16px 0;}.mk-cards-area{padding:12px;}.mk-stats{flex-wrap:wrap;gap:6px;}.mk-stat{min-width:70px;padding:10px 12px;}}
.focus-block{border-radius:10px;padding:14px 16px;margin-bottom:12px;animation:fadeInUp .3s cubic-bezier(.16,1,.3,1);}
.fab{display:none;position:fixed;bottom:76px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--blue2);color:#fff;border:none;cursor:pointer;font-size:24px;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(31,111,235,.5);z-index:90;transition:transform .15s;}
.fab:active{transform:scale(.93);}

.themed-page{min-height:unset !important;}
/* ── Fix SVG icon color ── */
.nav-item svg,.bottom-nav-item svg,.admin-topbar svg,.admin-bottom-nav svg{display:inline-block;vertical-align:middle;flex-shrink:0;width:18px;height:18px;}
.nav-item{color:var(--text2);}
.nav-item.active{color:var(--blue);}
.bottom-nav-item{color:var(--text2);}
.bottom-nav-item.active{color:var(--blue);}
.ach-badge{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;border-radius:10px;min-width:60px;transition:all .2s;}
.onboard-progress-dot{height:6px;border-radius:3px;transition:all .3s;}
.gs-result{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.gs-result:hover{background:var(--bg3);}
.contact-action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.ai-card{border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);background:var(--bg2);}
.ai-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.ai-stream{white-space:pre-wrap;line-height:1.8;font-size:14px;color:var(--text);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-cursor{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;animation:pulse .8s infinite;vertical-align:middle;}
.pn-banner{border-radius:12px;padding:14px 16px;background:linear-gradient(135deg,rgba(88,166,255,.1),rgba(188,140,255,.08));border:1px solid rgba(88,166,255,.25);}
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.search-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:20px;font-size:12px;background:var(--bg3);border:1px solid var(--border);}

/* ── API Key Banner ── */
.api-key-banner{background:rgba(31,111,235,.08);border:1px solid rgba(88,166,255,.3);border-radius:10px;padding:16px;margin-bottom:16px;}
.api-key-banner.warning{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.3);}
.api-key-banner.success{background:rgba(63,185,80,.08);border-color:rgba(63,185,80,.3);}

/* ═══════════════════════════════════════════
   MOBILE OVERRIDE — ต้องอยู่ท้ายสุดเสมอ
═══════════════════════════════════════════ */
@media(max-width:768px){
  /* ลบ background ของ themed pages บน mobile ให้ใช้สีพื้นฐานแทน */
  .admin-mobile-content>div[style]{background:var(--bg) !important;}
  /* ให้ text ยังมองเห็นได้ */
  .admin-mobile-content{color:var(--text) !important;}
}

@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══════════════════════════════════════
   GLOBAL ANIMATIONS & TRANSITIONS
═══════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════
   🎨 CASEPOOL LIGHT MODE — PREMIUM UPGRADE v2.1
   
   วิธีติดตั้ง:
   1. เปิดไฟล์ HTML หลัก (CasePool)
   2. หาบรรทัดนี้ใน <style>:
      /* ═══════════════════════════════════════
         GLOBAL ANIMATIONS & TRANSITIONS
   3. วาง CSS ด้านล่างนี้ทั้งหมดไว้ก่อนบรรทัดนั้น
═══════════════════════════════════════════════════════════ */

/* ── CSS Variables: ลึก + ชัดขึ้น ── */
body.light {
  --bg: #f1f5fb;
  --bg2: #ffffff;
  --bg3: #f0f4f8;
  --bg4: #e2e8f0;
  --border: #dce4ef;
  --text: #0f172a;
  --text2: #1e3a5f;
  --text3: #64748b;
  --blue: #2563eb;
  --blue2: #1d4ed8;
  --green: #15803d;
  --red: #dc2626;
  --yellow: #92400e;
  --purple: #7c3aed;
  --orange: #c2410c;
  --shadow: 0 4px 24px rgba(15,23,42,.09);
}

/* ── Page background ── */
body.light,
body.light .page { background: #f1f5fb !important; }

/* ── Card — Glass effect ── */
body.light .card {
  background: rgba(255,255,255,.92);
  border-color: #dce4ef;
  box-shadow: 0 2px 8px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
  backdrop-filter: blur(10px);
}
body.light .stat-card {
  background: rgba(255,255,255,.92);
  border: 1px solid #dce4ef;
  box-shadow: 0 2px 8px rgba(15,23,42,.05);
}

/* ── Market cards ── */
body.light .mkc {
  background: rgba(255,255,255,.92);
  border-color: #dce4ef;
  box-shadow: 0 2px 8px rgba(15,23,42,.05);
}
body.light .mkc:hover {
  border-color: #2563eb;
  box-shadow: 0 4px 20px rgba(37,99,235,.13);
}
body.light .market-card {
  background: #fff;
  border-color: #dce4ef;
  box-shadow: 0 1px 6px rgba(15,23,42,.06);
}
body.light .market-card:hover {
  border-color: #2563eb;
  box-shadow: 0 4px 20px rgba(37,99,235,.1);
}

/* ── Typography ── */
body.light .page-title { color: #0f172a; font-weight: 800; }
body.light label       { color: #1e3a5f; font-weight: 600; }
body.light .stat-num   { font-weight: 900; }
body.light .mkc-name   { color: #0f172a; font-weight: 700; }
body.light .mkc-id     { color: #2563eb; }

async function sbQ(method,table,q={},body=null){
  // แยก raw params (ที่มี % อยู่แล้ว) ออกจาก normal params
  const baseUrl=`${SUPA_URL}/rest/v1/${table}`;
  const normalParams=[];const rawParts=[];
  Object.entries(q).forEach(([k,v])=>{
    const s=String(v);
    if(s.includes('%25')||s.includes('%20')){
      // ถ้ามี encoded chars ให้ใส่ตรงๆ ใน URL โดยไม่ encode ซ้ำ
      rawParts.push(encodeURIComponent(k)+'='+s);
    } else {
      normalParams.push([k,s]);
    }
  });
  const url=new URL(baseUrl);
  normalParams.forEach(([k,v])=>url.searchParams.set(k,v));
  const finalUrl=rawParts.length>0?url.toString()+(url.search?'&':'?')+rawParts.join('&'):url.toString();
  
  // ✅ ถ้าเป็น GET และมี limit มากกว่า 1000 ให้ใช้ pagination
  const limit = q.limit ? parseInt(q.limit) : 1000;
  const needsPagination = method === 'GET' && limit > 1000;
  
  if (needsPagination) {
    // ดึงข้อมูลทีละ 1000 rows
    const allData = [];
    let offset = 0;
    const pageSize = 1000;
    
    while (offset < limit) {
      const h={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Range':`${offset}-${offset+pageSize-1}`};
      const opts={method:'GET',headers:h};
      const r=await fetch(finalUrl,opts);
      if(r.status===204)break;
      const t=await r.text();
      try{
        const pageData=JSON.parse(t);
        if(!Array.isArray(pageData) || pageData.length===0)break;
        allData.push(...pageData);
        if(pageData.length<pageSize)break; // ไม่มีข้อมูลเพิ่มแล้ว
        offset+=pageSize;
      }catch(e){break;}
    }
    return allData;
  }
  
  // ✅ กรณีปกติ (ไม่ใช่ pagination)
  const h={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Range':'0-4999'};
  if(method!=='GET')h['Prefer']='return=representation';
  const opts={method,headers:h};if(body!==null)opts.body=JSON.stringify(body);
  const r=await fetch(finalUrl,opts);
  if(r.status===204)return[];const t=await r.text();try{return JSON.parse(t);}catch(e){return[];}
}

async function genCaseId(){
  const d=new Date(),pre=String(d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,'0');
  const rows=await sbQ('GET','cases',{select:'caseid',caseid:`like.${pre}*`,order:'caseid.desc',limit:'1'});
  let max=0;if(rows?.length){const id=String(rows[0].caseid||'');if(id.startsWith(pre))max=parseInt(id.slice(4))||0;}
  return pre+String(max+1).padStart(3,'0');
}

async function getSmartAssignSales(){
  const [users,cs]=await Promise.all([sbQ('GET','users',{role:'eq.Sales',status:'eq.active',select:'name'}),sbQ('GET','cases',{caseid:`like.${String(new Date().getFullYear()).slice(-2)+String(new Date().getMonth()+1).padStart(2,'0')}*`,select:'sales,status'})]);
  const salesList=(users||[]).map(u=>u.name);if(!salesList.length)return null;
  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
  const stats={};salesList.forEach(s=>stats[s]={total:0,closed:0,active:0});
  (cs||[]).forEach(c=>{if(!stats[c.sales])return;stats[c.sales].total++;CLOSED.includes(c.status)?stats[c.sales].closed++:stats[c.sales].active++;});
  let best=null,bsc=-1;salesList.forEach(s=>{const st=stats[s];const sc=(st.total>0?st.closed/st.total:0)*0.7+(1/(st.active+1))*0.3;if(sc>bsc){bsc=sc;best=s;}});
  return best||salesList[0];
}

function ApiKeyManager({onKeyReady}){
  const [key, setKey] = useState(getAnthropicKey);
  const [input, setInput] = useState('');
  const [saved, setSaved] = useState(false);

  useEffect(()=>{ if(key) onKeyReady(key); },[key]);

  function handleSave(){
    const k = input.trim();
    if(!k.startsWith('sk-ant-')){ alert('API Key ต้องขึ้นต้นด้วย sk-ant-'); return; }
    saveAnthropicKey(k);
    setKey(k);
    setSaved(true);
    onKeyReady(k);
    setTimeout(()=>setSaved(false), 3000);
  }

  if(key) return <div className="api-key-banner success" style={{marginBottom:12,display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
    <span style={{fontSize:16}}>🔑</span>
    <span style={{fontSize:12,color:'var(--green)',flex:1}}>API Key พร้อมใช้งานแล้ว</span>
    <button className="btn btn-ghost" style={{fontSize:11,padding:'3px 10px'}} onClick={()=>{saveAnthropicKey('');setKey('');setInput('');}}>เปลี่ยน Key</button>
  </div>;

  return <div className="api-key-banner warning" style={{marginBottom:16}}>
    <div style={{fontWeight:700,fontSize:13,marginBottom:6,display:'flex',alignItems:'center',gap:6}}><Ico.key/> ต้องการ Anthropic API Key ก่อนใช้ AI</div>
    <div style={{fontSize:12,color:'var(--text2)',marginBottom:10,lineHeight:1.6}}>
      หา key ได้ที่ <strong>console.anthropic.com</strong> → API Keys → Create Key<br/>
      Key จะขึ้นต้นด้วย <code style={{background:'var(--bg3)',padding:'1px 6px',borderRadius:4}}>sk-ant-...</code>
    </div>
    <div style={{display:'flex',gap:8}}>
      <input type="password" value={input} onChange={e=>setInput(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&handleSave()}
        placeholder="sk-ant-api03-..." style={{flex:1,fontSize:12}}/>
      <button className="btn btn-primary" style={{fontSize:12,padding:'8px 14px',whiteSpace:'nowrap'}} onClick={handleSave}>
        {saved?'✅ บันทึก!':'บันทึก'}
      </button>
    </div>
  </div>;
}

function HistoryModal({caseId,onClose}){
  const [rows,setRows]=useState([]);const [loading,setLoading]=useState(true);
  useEffect(()=>{api('getHistory',{caseId}).then(r=>{if(r.success)setRows(r.data||[]);setLoading(false);});},[caseId]);
  function getActionStyle(action){const a=String(action||'').trim();if(a.includes('เพิ่มเคส'))return{icon:'✨',bg:'rgba(63,185,80,.15)',border:'rgba(63,185,80,.4)',color:'var(--green)'};if(a.includes('แก้ไข'))return{icon:'✏️',bg:'rgba(88,166,255,.12)',border:'rgba(88,166,255,.35)',color:'var(--blue)'};if(a.includes('ส่งตลาด'))return{icon:'⬆️',bg:'rgba(210,153,34,.15)',border:'rgba(210,153,34,.4)',color:'var(--yellow)'};if(a.includes('รับเคส'))return{icon:'🤝',bg:'rgba(188,140,255,.15)',border:'rgba(188,140,255,.4)',color:'var(--purple)'};if(a.includes('คืนเคส'))return{icon:'↩️',bg:'rgba(255,166,87,.15)',border:'rgba(255,166,87,.4)',color:'var(--orange)'};if(a.includes('ปิดเคส'))return{icon:'🔒',bg:'rgba(248,81,73,.12)',border:'rgba(248,81,73,.35)',color:'var(--red)'};return{icon:'📝',bg:'rgba(139,148,158,.12)',border:'rgba(139,148,158,.3)',color:'var(--text2)'};}
  function formatDate(d){const s=String(d||'');if(s.includes('T')){const dt=new Date(s);if(!isNaN(dt)){return[`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getFullYear()).slice(-2)}`,`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`];}}const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(m)return[`${m[1]}/${m[2]}/${String(m[3]).slice(-2)}`,`${m[4]}:${m[5]}`];return[s,''];}
  const grouped=rows.reduce((acc,h)=>{const[date]=formatDate(h['วันที่']);if(!acc[date])acc[date]=[];acc[date].push(h);return acc;},{});
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal" style={{maxWidth:500,borderRadius:14}}>
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:4,height:22,background:'var(--purple)',borderRadius:2,flexShrink:0}}/>
        <span style={{fontWeight:700,fontSize:15}}>Timeline เคส {caseId}</span>
        <button className="btn btn-ghost" style={{padding:'4px 8px',marginLeft:'auto'}} onClick={onClose}><Ico.x/></button>
      </div>
      <div style={{padding:'16px 20px',maxHeight:'75vh',overflowY:'auto'}}>
        {loading?<SkeletonCards n={3}/>:rows.length===0?<div style={{textAlign:'center',padding:'40px 0',color:'var(--text2)'}}><div style={{fontSize:36,marginBottom:8}}>📭</div><div>ยังไม่มีประวัติ</div></div>:
        Object.entries(grouped).map(([date,items],gi)=><div key={gi} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap'}}>📅 {date}</div><div style={{flex:1,height:1,background:'var(--border)'}}/></div>
          <div style={{position:'relative',paddingLeft:44}}>
            {items.length>1&&<div style={{position:'absolute',left:17,top:20,bottom:20,width:2,background:'var(--border)',borderRadius:1}}/>}
            {items.map((h,i)=>{const st=getActionStyle(h.action);const[,time]=formatDate(h['วันที่']);return <div key={i} style={{position:'relative',marginBottom:i<items.length-1?16:0}}>
              <div style={{position:'absolute',left:-44,width:34,height:34,borderRadius:'50%',background:st.bg,border:`2px solid ${st.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,boxShadow:'0 0 0 3px var(--bg2)'}}>{st.icon}</div>
              <div style={{background:'var(--bg3)',border:`1px solid var(--border)`,borderLeft:`3px solid ${st.border}`,borderRadius:8,padding:'10px 14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}><div style={{fontSize:13,fontWeight:700,color:st.color}}>{h.action}</div><div style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>{time}</div></div>
                {h.detail&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:4,lineHeight:1.5}}>{h.detail}</div>}
                <div style={{fontSize:11,color:'var(--text3)'}}><span style={{background:'rgba(88,166,255,.1)',color:'var(--blue)',padding:'1px 7px',borderRadius:20,fontWeight:600}}>{h['เซลส์']||'ระบบ'}</span></div>
              </div>
            </div>;})}
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

// 🧠 CASE INTELLIGENCE — Score / Alert / Suggestion
// ============================================================
function calculateCaseScore(c){
  let score=0;
  const STATUS_SCORE={'ไปต่อได้':80,'จอง':90,'รอเซ็นต์':85,'รอผล':75,'อนุมัติ':88,'เคสวัด 50/50':60,'เคสเลี้ยง':40,'กำลังติดต่อ':50,'รอข้อมูล':30,'ยังไม่สะดวก':20,'ติดต่อไม่ได้':10};
  score += STATUS_SCORE[c.status]||0;
  const parseD=d=>{const s=String(d||'');const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));};
  const upd=parseD(c.updatedat);
  if(upd){const hrs=(Date.now()-upd.getTime())/3600000;if(hrs<2)score+=20;else if(hrs<12)score+=12;else if(hrs<24)score+=6;}
  if(c.report&&c.report.length>20)score+=10;
  return Math.min(score,100);
}

function getCaseAlert(c){
  const parseD=d=>{const s=String(d||'');const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));};
  const upd=parseD(c.updatedat);
  const hrs=upd?(Date.now()-upd.getTime())/3600000:999;
  if(['ไปต่อได้','จอง','รอเซ็นต์','รอผล','อนุมัติ'].includes(c.status)&&hrs>4)return{msg:'🔥 รีบโทร! ลูกค้าร้อน',color:'var(--red)'};
  if(c.status==='ติดต่อไม่ได้')return{msg:'📞 เปลี่ยนช่องทางติดต่อ',color:'var(--orange)'};
  if(hrs>48)return{msg:'❄️ เคสเย็นมาก — รีบตาม',color:'var(--text3)'};
  if(hrs>24)return{msg:'⚠️ เคสเริ่มเย็น',color:'var(--yellow)'};
  return null;
}

function getCaseSuggestion(c){
  if(c.status==='ไปต่อได้')return'📞 โทรปิดทันที อย่ารอ!';
  if(c.status==='จอง'||c.status==='รอเซ็นต์')return'📄 เตรียมเอกสาร + ยืนยันนัด';
  if(c.status==='รอผล'||c.status==='อนุมัติ')return'⏳ รอธนาคาร — อัปเดตลูกค้าทุกวัน';
  if(c.status==='เคสวัด 50/50')return'💬 ทักไลน์ + ส่งโปรโมชั่น';
  if(c.status==='เคสเลี้ยง')return'🤝 นัดให้มาดูรถจริง';
  if(c.status==='ติดต่อไม่ได้')return'📱 ลองโทร/ไลน์/ช่องทางอื่น';
  if(c.status==='ยังไม่สะดวก')return'⏰ ตั้ง Follow-up ตามนัด';
  return'📝 อัปเดตรีพอร์ต + หาข้อมูลเพิ่ม';
}

function ScoreBadge({score}){
  const cfg=score>=80?{bg:'rgba(248,81,73,.15)',color:'var(--red)',label:'🔥 ร้อน'}:

                      {bg:'rgba(139,148,158,.12)',color:'var(--text3)',label:'❄️ เย็น'};
  return<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,background:cfg.bg,color:cfg.color,flexShrink:0}}>{cfg.label}</span>;
}

function AdminAnalytics({currentUser}){
  const [cases,setCases]=useState([]);const [claimed,setClaimed]=useState([]);const [loading,setLoading]=useState(true);
  const [range,setRange]=useState('month'); // month|3month|all
  useEffect(()=>{Promise.all([api('getCases',{all:'true'}),api('getClaimedCases',{})]).then(([cr,ccr])=>{if(cr.success)setCases(cr.data||[]);if(ccr.success)setClaimed(ccr.data||[]);setLoading(false);});},[]);
  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
  function getMonthPre(monthsAgo){const d=new Date();d.setMonth(d.getMonth()-monthsAgo);return String(d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,'0');}
  const monthCount=range==='month'?1:range==='3month'?3:12;
  const prefixes=Array.from({length:monthCount},(_,i)=>getMonthPre(monthCount-1-i));
  const MONTH_LABELS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  function monthLabel(pre){const y=2000+parseInt(pre.slice(0,2)),m=parseInt(pre.slice(2,4))-1;return MONTH_LABELS[m]+(monthCount>3?' '+String(y+543).slice(-2):'');}
  // รวม stats ต่อเดือน
  const monthStats=prefixes.map(pre=>{const mc=cases.filter(c=>String(c.caseid||'').startsWith(pre));return{pre,label:monthLabel(pre),total:mc.length,sold:mc.filter(c=>c.status==='ปล่อยแล้ว').length,active:mc.filter(c=>!CLOSED.includes(c.status)).length,wr:mc.length>0?Math.round(mc.filter(c=>c.status==='ปล่อยแล้ว').length/mc.length*100):0};});
  // สถิติแต่ละเซลส์
  const salesNames=[...new Set(cases.map(c=>c.sales).filter(Boolean))];
  const salesStats=salesNames.map(name=>{const mc=cases.filter(c=>c.sales===name&&prefixes.some(p=>String(c.caseid||'').startsWith(p)));const sold=mc.filter(c=>c.status==='ปล่อยแล้ว').length;const score=calculateCaseScore;return{name,total:mc.length,sold,wr:mc.length>0?Math.round(sold/mc.length*100):0};}).sort((a,b)=>b.sold-a.sold);
  // Funnel
  const allPeriod=cases.filter(c=>prefixes.some(p=>String(c.caseid||'').startsWith(p)));
  const funnel=[['เข้าระบบ',allPeriod.length],['คุยแล้ว',allPeriod.filter(c=>c.report&&c.report.length>5).length],['ไปต่อได้',allPeriod.filter(c=>['ไปต่อได้','เคสวัด 50/50','จอง','รอเซ็นต์','รอผล','อนุมัติ','ปล่อยแล้ว'].includes(c.status)).length],['จอง',allPeriod.filter(c=>['จอง','รอเซ็นต์','รอผล','อนุมัติ','ปล่อยแล้ว'].includes(c.status)).length],['ปล่อยรถ',allPeriod.filter(c=>c.status==='ปล่อยแล้ว').length]];
  const maxF=funnel[0][1]||1;
  return<div className="page">
    <div className="page-hd"><div><div className="page-title">📈 Analytics</div><div style={{fontSize:12,color:'var(--text2)'}}>วิเคราะห์เชิงลึก</div></div><button className="btn btn-ghost" style={{fontSize:13}} onClick={()=>{cacheClear(['getCases','getClaimedCases']);location.reload();}}>🔄</button></div>
    {/* Range Selector */}
    <div style={{display:'flex',gap:6,marginBottom:16}}>
      {[['month','เดือนนี้'],['3month','3 เดือน'],['all','ปีนี้']].map(([k,l])=>
        <button key={k} onClick={()=>setRange(k)} style={{padding:'6px 16px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,background:range===k?'var(--blue2)':'var(--bg3)',color:range===k?'#fff':'var(--text2)'}}>{l}</button>)}
    </div>
    {loading?<Loading/>:<>
      {/* Summary Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
        {[['📋 เคสทั้งหมด',allPeriod.length,'var(--blue)'],['🚗 ปล่อยแล้ว',allPeriod.filter(c=>c.status==='ปล่อยแล้ว').length,'var(--green)'],['🔥 Win Rate',allPeriod.length>0?Math.round(allPeriod.filter(c=>c.status==='ปล่อยแล้ว').length/allPeriod.length*100)+'%':'-','var(--yellow)'],['🏪 ตลาด',claimed.length,'var(--purple)']].map(([l,v,c])=>
          <div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 8px',textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:3,lineHeight:1.3}}>{l}</div>
          </div>)}
      </div>
      {/* Trend by Month */}
      {monthStats.length>1&&<div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📊 Trend รายเดือน</div>
        {monthStats.map((m,i)=>{const maxT=Math.max(...monthStats.map(x=>x.total),1);return<div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style={{fontSize:12,color:'var(--text2)',width:44,flexShrink:0}}>{m.label}</div>
          <div style={{flex:1,height:28,background:'var(--bg3)',borderRadius:6,overflow:'hidden',position:'relative'}}>
            <div style={{height:'100%',width:Math.round(m.total/maxT*100)+'%',background:'rgba(88,166,255,.4)',borderRadius:6}}/>
            <div style={{position:'absolute',inset:0,height:'100%',width:Math.round(m.sold/maxT*100)+'%',background:'rgba(63,185,80,.7)',borderRadius:6}}/>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',paddingLeft:8,fontSize:11,fontWeight:700}}>
              {m.total} เคส · ปล่อย {m.sold} · <span style={{color:m.wr>=20?'var(--green)':'var(--yellow)',marginLeft:4}}>{m.wr}%</span>
            </div>
          </div>
        </div>;})}
      </div>}
      {/* Sales Funnel */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🎯 Sales Funnel</div>
        {funnel.map(([label,val],i)=>{const pct=Math.round(val/maxF*100);const convPct=i>0&&funnel[i-1][1]>0?Math.round(val/funnel[i-1][1]*100):100;return<div key={i} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:600}}>{['📥','💬','⬆️','📋','🚗'][i]} {label}</span>
            <span style={{fontSize:12,color:'var(--text2)'}}>{val} คน {i>0&&<span style={{color:convPct>=50?'var(--green)':'var(--yellow)'}}>({convPct}%)</span>}</span>
          </div>
          <div style={{height:8,background:'var(--bg3)',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:4,background:i===4?'var(--green)':i===3?'var(--blue)':i===2?'var(--purple)':'rgba(88,166,255,.5)',width:pct+'%',transition:'width .5s'}}/>
          </div>
        </div>;})}
      </div>
      {/* Sales Leaderboard */}
      <div className="card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🏆 Leaderboard เซลส์</div>
        {salesStats.map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<salesStats.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:i===0?'#3d2a00':i===1?'#1c1c2e':i===2?'#1a2a00':'var(--bg3)',color:i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--text3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,flexShrink:0}}>{i<3?['🥇','🥈','🥉'][i]:i+1}</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{s.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>เคส {s.total} · ปล่อย {s.sold}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:15,fontWeight:800,color:s.wr>=30?'var(--green)':s.wr>=15?'var(--yellow)':'var(--text3)'}}>{s.wr}%</div><div style={{fontSize:10,color:'var(--text3)'}}>Win Rate</div></div>
          <div style={{width:60,height:6,background:'var(--bg3)',borderRadius:3,overflow:'hidden',flexShrink:0}}>
            <div style={{height:'100%',background:s.wr>=30?'var(--green)':s.wr>=15?'var(--yellow)':'var(--text3)',width:Math.min(s.wr*2,100)+'%'}}/>
          </div>
        </div>)}
      </div>
    </>}
  </div>;
}

function CaseModal({caseData,users,currentUser,onClose,onUpdated,isInMarket=false}){
  const [status,setStatus]=useState(caseData.status||caseData.newstatus||'รอข้อมูล');
  const [sentType,setSentType]=useState(caseData.sent||'ปกติ');
  const [report,setReport]=useState(caseData.report||'');
  const [editReport,setEditReport]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [newSales,setNewSales]=useState(caseData.sales||caseData.sale||'');
  const [notes,setNotes]=useState([]);
  const [addingNote,setAddingNote]=useState(false);
  const [newNote,setNewNote]=useState('');
  const [confirmDel,setConfirmDel]=useState(false);
  const isAdmin=currentUser.role==='Admin';
  const isClaimed=!!caseData.fromsales;
  const isMarketLocked=isInMarket&&!isAdmin; // Sales ดูได้แต่แก้ไขไม่ได้
  const caseId=caseData.caseid||caseData.caseID;
  const FU_KEY='cp_followup_'+caseId;
  const [showTransfer,setShowTransfer]=useState(false);
  const [transferTo,setTransferTo]=useState('');
  const [transferring,setTransferring]=useState(false);
  async function doTransfer(){
    if(!transferTo)return;
    setTransferring(true);
    const r=await api('adminChangeSales',{caseId,newSales:transferTo});
    if(r.success){
      // บันทึก history ว่าโอนจากใครไปใคร
      await api('updateCase',{caseid:caseId,sales:transferTo,changedBy:currentUser.name,detail:'โอนเคสจาก '+currentUser.name+' → '+transferTo});
      // แจ้งเตือนคนรับเคส
      sbNotif(transferTo,caseId,'🔄 '+currentUser.name+' โอนเคส '+caseId+' ('+(caseData.customername||caseData.name||'')+') มาให้คุณ');
      pushNotif(transferTo,'🔄 ได้รับเคสโอน','เคส '+caseId+' จาก '+currentUser.name);
      onUpdated();onClose();
    }else{alert('โอนเคสไม่สำเร็จ: '+(r.error||''));setTransferring(false);}
  }
  const [followups,setFollowups]=useState(()=>{try{return JSON.parse(localStorage.getItem(FU_KEY)||'[]');}catch(e){return[];}});
  const [followupDate,setFollowupDate]=useState('');
  const [followupNote,setFollowupNote]=useState('');
  function saveFollowup(){if(!followupDate)return;const newFU={date:followupDate,note:followupNote,done:false,caseid:caseId,customername:caseData.customername||caseData.name||'',by:currentUser.name};const upd=[...followups,newFU];setFollowups(upd);try{localStorage.setItem(FU_KEY,JSON.stringify(upd));}catch(e){}
    sbHist(caseId,currentUser.name,'นัด Follow-up','นัด Follow-up: '+followupDate+(followupNote?' — '+followupNote:''));
    setFollowupDate('');setFollowupNote('');}
  function doneFollowup(i){const upd=followups.map((f,idx)=>idx===i?{...f,done:true}:f);setFollowups(upd);try{localStorage.setItem(FU_KEY,JSON.stringify(upd));}catch(e){}}
  function delFollowup(i){const upd=followups.filter((_,idx)=>idx!==i);setFollowups(upd);try{localStorage.setItem(FU_KEY,JSON.stringify(upd));}catch(e){}}
  const contactRaw=caseData.contact||'';
  const contactVal=formatContact(contactRaw);
  const isQR=contactRaw.startsWith('http')||contactRaw.startsWith('data:image');
  useEffect(()=>{try{const d=JSON.parse(localStorage.getItem('cnotes_'+caseId)||'[]');setNotes(Array.isArray(d)?d:[]);}catch(e){setNotes([]);}},[caseId]);
  function saveNote(){if(!newNote.trim())return;
    const upd=[...notes,{text:newNote.trim(),date:new Date().toLocaleString('th-TH'),by:currentUser.name}];
    setNotes(upd);setNewNote('');setAddingNote(false); // UI update ก่อนทันที
    try{localStorage.setItem('cnotes_'+caseId,JSON.stringify(upd));}catch(e){}
    sbHist(caseId,currentUser.name,'📝 Note','📝 Note: '+newNote.trim()); // sync background
  }
  function deleteNote(i){const upd=notes.filter((_,idx)=>idx!==i);setNotes(upd);try{localStorage.setItem('cnotes_'+caseId,JSON.stringify(upd));}catch(e){}}
  async function save(){
    const optimisticData=isClaimed?{...caseData,newstatus:status}:{...caseData,status,report:editReport?report:caseData.report,sales:(isAdmin&&newSales)?newSales:caseData.sales};
    onUpdated(optimisticData);onClose();
    try{if(isClaimed){await api('updateClaimed',{caseId,newstatus:status,Notes:'',sales:currentUser.name});}else{const upd={caseid:caseId,status,sent:sentType,changedBy:currentUser.name,detail:'เปลี่ยนสถานะเป็น '+status};if(editReport)upd.report=report;await api('updateCase',upd);if(isAdmin&&newSales&&newSales!==caseData.sales)await api('adminChangeSales',{caseId,newSales});}}catch(e){}
  }
  async function saveReport(){if(!report.trim())return;setEditReport(false);onUpdated({...caseData,report});onClose();try{await api('updateCase',{caseid:caseId,report,changedBy:currentUser.name,detail:'แก้ไขรีพอร์ต'});}catch(e){}}
  async function doDelete(){onClose();const r=await api('deleteCase',{caseId,caseid:caseId,deletedBy:currentUser.name});cacheClear(['getCases','getMarket','getDashboard','getClaimedCases','getHistory','getNotifications']);if(r.success){onUpdated();}else{alert('เกิดข้อผิดพลาด: '+(r.error||'ไม่สามารถลบได้'));}}
  if(showHistory)return <HistoryModal caseId={caseId} onClose={()=>setShowHistory(false)}/>;

        <div style={{padding:'16px 20px',overflowY:'auto',maxHeight:'calc(100vh - 320px)'}}>

            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{color:'var(--text2)'}}>รหัสเคส: </span><span style={{fontWeight:700,color:'var(--blue)'}}>{caseId}</span><button className="btn btn-primary" style={{padding:'3px 14px',fontSize:12,borderRadius:20}} onClick={()=>copyText(caseId)}>Copy</button></div>
            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{color:'var(--text2)'}}>ชื่อลูกค้า: </span><span style={{fontWeight:600}}>{caseData.customername||caseData.name||'-'}</span>{(caseData.customername||caseData.name)&&<button className="btn btn-primary" style={{padding:'3px 14px',fontSize:12,borderRadius:20}} onClick={()=>copyText(caseData.customername||caseData.name||'')}>Copy</button>}</div>
            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{color:'var(--text2)'}}>ติดต่อ: </span>{isQR?<div style={{marginTop:6,width:'100%'}}><img src={contactRaw} alt="QR" style={{maxWidth:'100%',maxHeight:220,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'block'}} onError={e=>{e.target.style.display='none';}}/></div>:isMarketLocked?<div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(188,140,255,.08)',border:'1px solid rgba(188,140,255,.3)',borderRadius:8,padding:'6px 12px'}}><span style={{fontSize:13,color:'var(--purple)',fontWeight:600}}>🏪 เคสอยู่ในตลาด — ไม่สามารถดูข้อมูลติดต่อได้</span></div>:<><span style={{fontWeight:600}}>{contactVal||'-'}</span>{contactVal&&<button className="btn btn-primary" style={{padding:'3px 14px',fontSize:12,borderRadius:20}} onClick={()=>copyText(contactVal)}>Copy</button>}{contactVal&&/^\d{9,10}$/.test(contactVal.replace(/\D/g,''))&&<a href={`tel:${contactVal}`} className="contact-action-btn" style={{background:'rgba(63,185,80,.15)',color:'var(--green)',textDecoration:'none'}}><Ico.phone/>โทร</a>}{contactVal&&/^\d{9,10}$/.test(contactVal.replace(/\D/g,''))&&<a href={`https://line.me/ti/p/~${contactVal}`} target="_blank" rel="noopener" className="contact-action-btn" style={{background:'rgba(0,200,83,.15)',color:'#06c755',textDecoration:'none'}}>💬 Line</a>}</>}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10}}>
            <div className="form-group"><label>สถานะ:</label><select value={status} onChange={e=>setStatus(e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="form-group"><label>การส่ง:</label>

                >{t==='ส่วนตัว'?'🔒 ส่วนตัว':'📤 ปกติ'}</button>)}
              </div>
            </div>
          </div>
          <div className="form-group"><label>เซลส์:</label>{isAdmin&&!isClaimed?<select value={newSales} onChange={e=>setNewSales(e.target.value)}><option value="">-- เลือกเซลส์ --</option>{(users||[]).filter(u=>u.role==='Sales').map(u=><option key={u.userId} value={u.name}>{u.name}</option>)}</select>:<div style={{display:'flex',gap:8,alignItems:'center'}}><div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',fontSize:14,flex:1}}>{caseData.sales||caseData.sale||currentUser.name}</div>{!isClaimed&&currentUser.role==='Sales'&&<button className="btn btn-ghost" style={{fontSize:12,padding:'6px 10px',whiteSpace:'nowrap',color:'var(--orange)'}} onClick={()=>setShowTransfer(v=>!v)}>↔ โอนเคส</button>}</div>}</div>

          {/* Case Intelligence */}
          {!isClaimed&&<div style={{background:'rgba(88,166,255,.07)',border:'1px solid rgba(88,166,255,.2)',borderRadius:8,padding:'10px 12px',marginBottom:12}}>

function ImageUploader({value,onChange,caseId='',label='📷',accept='image/*',maxMB=10}){
  const [status,setStatus]=useState('');const [preview,setPreview]=useState(()=>value||'');const fileRef=useRef();
  const prevRef=useRef(value);useEffect(()=>{if(!value&&prevRef.current){setPreview('');setStatus('');}prevRef.current=value;},[value]);
  function compressImage(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{const MAX=800;let w=img.width,h=img.height;if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);resolve(canvas.toDataURL('image/jpeg',0.80));};img.onerror=()=>resolve(ev.target.result);img.src=ev.target.result;};reader.onerror=()=>resolve('');reader.readAsDataURL(file);});}
  async function handleFile(e){const file=e.target.files[0];if(!file)return;if(!file.type.startsWith('image/'))return alert('กรุณาเลือกไฟล์รูปภาพ');if(file.size>maxMB*1024*1024)return alert(`ไฟล์ต้องไม่เกิน ${maxMB}MB`);setStatus('compressing');const compressed=await compressImage(file);if(!compressed){setStatus('error');return;}setPreview(compressed);onChange(compressed);setStatus('done');}
  function handlePaste(e){const items=e.clipboardData?.items||[];for(const item of items){if(item.type.startsWith('image/')){handleFile({target:{files:[item.getAsFile()]}});}}}
  function clear(e){e.stopPropagation();e.preventDefault();setPreview('');onChange('');setStatus('');if(fileRef.current)fileRef.current.value='';}
  return <div onPaste={handlePaste}><input ref={fileRef} type="file" accept={accept} style={{display:'none'}} onChange={handleFile}/>{preview?<div style={{position:'relative',display:'inline-block',width:'100%'}}><img src={preview} alt="รูปภาพ" style={{width:'100%',maxHeight:220,objectFit:'contain',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'block'}} onError={e=>{e.target.style.opacity='0.3';}}/><button type="button" onClick={clear} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.65)',border:'none',borderRadius:'50%',width:26,height:26,color:'#fff',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button></div>:<div style={{display:'flex',gap:8,flexDirection:'column'}}><button type="button" className="btn btn-ghost" style={{width:'100%',padding:'14px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,border:'2px dashed var(--border)',borderRadius:8}} onClick={()=>fileRef.current?.click()}><span style={{fontSize:28}}>{label}</span><span style={{fontSize:13}}>แตะเพื่อเลือกรูป</span><span style={{fontSize:11,color:'var(--text3)'}}>JPG, PNG สูงสุด {maxMB}MB</span></button><input value={value||''} onChange={e=>onChange(e.target.value)} placeholder="หรือวาง URL รูปภาพ" style={{fontSize:13}}/></div>}</div>;
}
function QrUploader({value,onChange,caseId=''}){return <ImageUploader value={value} onChange={onChange} caseId={caseId} label="📷" maxMB={10}/>;}

function daysAgo(s){const m=String(s||'').match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(!m)return 0;const dt=new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));return Math.floor((Date.now()-dt.getTime())/86400000);}
function parseHistDate(s){const m=String(s||'').match(/(\d+)\/(\d+)\/(\d+)/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));}function getDateBadge(c){const id=String(c.ID||'');if(id.length>=6){const yy=id.slice(0,2),mm=id.slice(2,4);const year=2000+parseInt(yy);const monthNames=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];const monthName=monthNames[parseInt(mm)-1]||mm;return`${monthName} ${year}`;}return '';}

function useChartJs(cb,deps){useEffect(()=>{if(window.Chart){cb();return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';s.onload=()=>cb();document.head.appendChild(s);},deps);}

function BarChart({id,labels,datasets,horizontal=false}){const ref=useRef();const inst=useRef();useChartJs(()=>{inst.current?.destroy();if(!ref.current)return;Chart.defaults.color='#8b949e';inst.current=new Chart(ref.current,{type:'bar',data:{labels,datasets:datasets.map(d=>({...d,borderRadius:5,borderSkipped:false}))},options:{indexAxis:horizontal?'y':'x',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16,font:{size:12}}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+c.raw}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:12}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:12},stepSize:1,precision:0}}}}});},  [labels,datasets]);useEffect(()=>()=>inst.current?.destroy(),[]);return <canvas ref={ref}/>;}

function DonutChart({id,labels,values,colors}){const ref=useRef();const inst=useRef();useChartJs(()=>{inst.current?.destroy();if(!ref.current)return;inst.current=new Chart(ref.current,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'var(--bg2)',hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{boxWidth:12,padding:10,font:{size:11}}},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${Math.round(c.raw/(c.dataset.data.reduce((a,b)=>a+b,0)||1)*100)}%)`}}}}});},  [labels,values]);useEffect(()=>()=>inst.current?.destroy(),[]);return <canvas ref={ref}/>;}

  const [editForm,setEditForm]=useState({name:'',password:'',status:'active',role:'Sales'});

  function openEdit(u){setEditUser(u);setEditForm({name:u.name||'',password:'',status:u.status||'active',role:u.role||'Sales',avatar:u.avatar||'',startdate:u.startdate||''});}
  async function saveEdit(){
    if(!editForm.name)return showToast('กรุณากรอกชื่อ','warn');
    setSaving(true);
    const upd={name:editForm.name,status:editForm.status,role:editForm.role,avatar:editForm.avatar||''};
    if(editForm.password.trim())upd.password=editForm.password.trim();
    if(editForm.startdate)upd.startdate=editForm.startdate;
    await api('updateUser',{userId:editUser.userId,...upd});
    setSaving(false);setEditUser(null);load();
  }
  async function toggleStatus(u){
    const newStatus=u.status==='active'?'inactive':'active';
    await api('updateUser',{userId:u.userId,status:newStatus});
    load();
  }
  const AU={bg:'linear-gradient(160deg,#080818 0%,#100828 50%,#0d1830 100%)',p:'#a78bfa',b:'#60a5fa',g:'#34d399',dim:'rgba(139,92,246,.1)',border:'rgba(139,92,246,.2)',text:'#e2e8f0',sub:'#6b7280'};
  return <div className="page" style={{paddingBottom:40}}>
    {/* AURORA HEADER */}
    <div style={{padding:'24px 28px 20px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,#8b5cf6,#3b82f6,#10b981,transparent)'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:10,color:'rgba(167,139,250,.5)',letterSpacing:3,textTransform:'uppercase',marginBottom:4}}>User Management</div>
          <div style={{fontSize:22,fontWeight:900,background:'linear-gradient(90deg,#a78bfa,#60a5fa,#34d399)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>👥 จัดการผู้ใช้</div>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{background:'linear-gradient(135deg,#7c3aed,#2563eb)',border:'none',borderRadius:10,color:'#fff',padding:'10px 18px',cursor:'pointer',fontSize:14,fontWeight:700,boxShadow:'0 4px 16px rgba(139,92,246,.4)'}}>+ เพิ่มผู้ใช้</button>
      </div>
    </div>
    {/* USER CARDS */}
    <div style={{padding:'16px 28px 80px'}}>
      {loading?<Loading/>:
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
        {users.map((u,i)=>{
          const isAdmin=u.role==='Admin';
          const cardColor=isAdmin?AU.p:AU.b;
          return <div key={i} style={{background:`linear-gradient(135deg,${cardColor}0e,${cardColor}06)`,border:`1px solid ${cardColor}30`,borderRadius:16,padding:18,transition:'all .2s'}}
            onMouseOver={e=>{e.currentTarget.style.borderColor=cardColor+'60';e.currentTarget.style.boxShadow=`0 0 20px ${cardColor}20`;}}
            onMouseOut={e=>{e.currentTarget.style.borderColor=cardColor+'30';e.currentTarget.style.boxShadow='none';}}>
            <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
              <div style={{width:52,height:52,borderRadius:'50%',background:`${cardColor}15`,border:`2px solid ${cardColor}50`,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0,boxShadow:`0 0 12px ${cardColor}30`}}>
                {u.avatar?<img src={u.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>:<span style={{fontSize:20}}>👤</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16,color:AU.text}}>{u.name}</div>
                <div style={{fontSize:12,color:`${cardColor}80`,marginTop:2}}>@{u.username}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
                <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,background:`${cardColor}15`,color:cardColor,border:`1px solid ${cardColor}40`}}>{u.role}</span>
                <span style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:20,background:u.status==='active'?'rgba(52,211,153,.12)':'rgba(248,113,113,.12)',color:u.status==='active'?AU.g:'#f87171',border:`1px solid ${u.status==='active'?AU.g+'40':'rgba(248,113,113,.4)'}`}}>{u.status==='active'?'● Active':'○ Inactive'}</span>
              </div>
            </div>
            <div style={{fontSize:11,color:AU.sub,marginBottom:12,padding:'6px 10px',background:'rgba(255,255,255,.03)',borderRadius:8}}>ID: {u.userId}{u.startdate?` · เริ่ม ${u.startdate}`:''}</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>openEdit(u)} style={{flex:1,background:`${cardColor}15`,border:`1px solid ${cardColor}40`,borderRadius:8,color:cardColor,padding:'8px',cursor:'pointer',fontSize:12,fontWeight:700,transition:'all .15s'}}
                onMouseOver={e=>{e.currentTarget.style.background=`${cardColor}25`;}}
                onMouseOut={e=>{e.currentTarget.style.background=`${cardColor}15`;}}>✏️ แก้ไข</button>
              {u.userId!==currentUser.userId&&<button onClick={()=>toggleStatus(u)} style={{flex:1,background:u.status==='active'?'rgba(248,113,113,.1)':'rgba(52,211,153,.1)',border:`1px solid ${u.status==='active'?'rgba(248,113,113,.4)':AU.g+'40'}`,borderRadius:8,color:u.status==='active'?'#f87171':AU.g,padding:'8px',cursor:'pointer',fontSize:12,fontWeight:700}}>{u.status==='active'?'🔒 ปิด':'🔓 เปิด'}</button>}
            </div>
          </div>;
        })}
      </div>}
    </div>

    {/* Add User Modal */}
    {showAdd&&<Modal title="➕ เพิ่มผู้ใช้ใหม่" onClose={()=>setShowAdd(false)} footer={<><button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>ยกเลิก</button><button className="btn btn-primary" onClick={addUser}>บันทึก</button></>}>
      <div style={{display:'grid',gap:12}}>
        <div className="form-group"><label>Username</label><input value={form.username} onChange={e=>set('username',e.target.value)} placeholder="ตัวอักษรภาษาอังกฤษ"/></div>
        <div className="form-group"><label>รหัสผ่าน</label><input value={form.password} onChange={e=>set('password',e.target.value)}/></div>
        <div className="form-group"><label>ชื่อที่แสดง</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="ชื่อจริง"/></div>
        <div className="form-group"><label>Role</label><select value={form.role} onChange={e=>set('role',e.target.value)}><option>Sales</option><option>Admin</option></select></div>
      </div>
    </Modal>}

    {/* Edit User Modal */}
    {editUser&&<Modal title={`✏️ แก้ไข — ${editUser.username}`} onClose={()=>setEditUser(null)} footer={<><button className="btn btn-ghost" onClick={()=>setEditUser(null)}>ยกเลิก</button><button className="btn btn-primary" onClick={saveEdit} disabled={saving}>{saving?'กำลังบันทึก...':'💾 บันทึก'}</button></>}>
      <div style={{display:'grid',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:16,background:'var(--bg3)',borderRadius:10,padding:'12px 14px'}}>
          <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg2)',border:'2px solid var(--border)',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>
            {editForm.avatar?<img src={editForm.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:'👤'}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700}}>{editUser.name}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>@{editUser.username} · {editUser.userId}</div>
            <button className="btn btn-ghost" style={{fontSize:11,padding:'3px 10px',marginTop:6}} onClick={()=>{const url=window.prompt('วาง URL รูปภาพ:',editForm.avatar||'');if(url!==null)setE('avatar',url);}}>📷 เปลี่ยนรูป</button>
            {editForm.avatar&&<button className="btn btn-ghost" style={{fontSize:11,padding:'3px 8px',marginTop:6,marginLeft:6,color:'var(--red)'}} onClick={()=>setE('avatar','')}>🗑 ลบรูป</button>}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>ชื่อที่แสดง *</label><input value={editForm.name} onChange={e=>setE('name',e.target.value)}/></div>
          <div className="form-group"><label>📅 วันเริ่มงาน</label><input type="date" value={editForm.startdate||''} onChange={e=>setE('startdate',e.target.value)}/></div>
        </div>
        <div className="form-group">
          <label>รหัสผ่านใหม่ <span style={{fontSize:11,color:'var(--text3)'}}>(ถ้าไม่เปลี่ยน ปล่อยว่างไว้)</span></label>
          <input type="text" value={editForm.password} onChange={e=>setE('password',e.target.value)} placeholder="กรอกรหัสใหม่ หรือปล่อยว่าง"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>Role</label><select value={editForm.role} onChange={e=>setE('role',e.target.value)}><option>Sales</option><option>Admin</option></select></div>
          <div className="form-group"><label>สถานะ</label><select value={editForm.status} onChange={e=>setE('status',e.target.value)}><option value="active">✅ Active</option><option value="inactive">🔒 Inactive</option></select></div>
        </div>
      </div>
    </Modal>}
  </div>;
}

// ============================================================
// ✅ ADMIN AI PAGE — แก้ไขแล้ว (มี API Key input + headers ถูกต้อง)
// ============================================================
function AdminAIPage({currentUser}){
  const [cases,setCases]=useState([]);
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [aiText,setAiText]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiDone,setAiDone]=useState(false);
  const [tab,setTab]=useState('urgent');
  const [apiKey,setApiKey]=useState(getAnthropicKey);
  const abortRef=useRef(null);

  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];

  const load=useCallback(()=>{
    setLoading(true);
    Promise.all([api('getCases',{all:'true'}),api('getUsers')]).then(([cr,ur])=>{
      if(cr.success)setCases((cr.data||[]).filter(c=>!CLOSED.includes(c.status)));
      if(ur.success)setUsers((ur.data||[]).filter(u=>u.role==='Sales'&&u.status==='active'));
      setLoading(false);
    });
  },[]);
  useEffect(()=>{load();},[load]);

  // ✅ FIX: streamAI ที่มี headers ถูกต้อง
  async function streamAI(prompt,sys){
    if(!apiKey){setAiText('❌ กรุณาใส่ Anthropic API Key ก่อน');setAiDone(true);setAiLoading(false);return;}
    setAiLoading(true);setAiText('');setAiDone(false);
    if(abortRef.current)abortRef.current.abort();
    const ctrl=new AbortController();abortRef.current=ctrl;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',signal:ctrl.signal,
        headers:{
          'Content-Type':'application/json',
          'x-api-key': apiKey,                                    // ✅ API Key header
          'anthropic-version': '2023-06-01',                     // ✅ version header
          'anthropic-dangerous-direct-browser-access': 'true'    // ✅ browser CORS header
        },
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:2000,stream:true,
          system:sys||'คุณคือที่ปรึกษาผู้จัดการทีมขายรถยนต์ ให้คำแนะนำเป็นภาษาไทย กระชับ ตรงประเด็น ใช้ emoji',
          messages:[{role:'user',content:prompt}]
        })
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`API error ${res.status}`);}
      const reader=res.body.getReader();const dec=new TextDecoder();
      while(true){const{done,value}=await reader.read();if(done)break;
        for(const line of dec.decode(value).split('\n')){if(!line.startsWith('data:'))continue;const d=line.slice(5).trim();if(d==='[DONE]')continue;try{const j=JSON.parse(d);if(j.type==='content_block_delta'&&j.delta?.text)setAiText(t=>t+j.delta.text);}catch(e){}}}
      setAiDone(true);
    }catch(err){if(err.name!=='AbortError')setAiText(t=>t+(t?'\n\n':'')+'❌ '+err.message);setAiDone(true);}
    setAiLoading(false);
  }

  function buildTeamSummary(){
    const d=new Date(),pre=String(d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,'0');
    return users.map(u=>{const my=cases.filter(c=>c.sales===u.name);const thisMonth=my.filter(c=>String(c.caseid||'').startsWith(pre));const sold=thisMonth.filter(c=>c.status==='ปล่อยแล้ว').length;const active=thisMonth.filter(c=>!CLOSED.includes(c.status)).length;const stale=my.filter(c=>daysAgo(c.updatedat)>=2).length;return`${u.name}: เคสเดือนนี้ ${thisMonth.length} | ปิดได้ ${sold} | active ${active} | ค้างนาน ${stale}`;}).join('\n');
  }

  function buildUrgentSummary(){
    return [...cases].sort((a,b)=>daysAgo(b.updatedat)-daysAgo(a.updatedat)).slice(0,50).map((c,i)=>`${i+1}. [${c.caseid}] ${c.customername} | เซลส์: ${c.sales} | สถานะ: ${c.status} | ไม่อัปเดต: ${daysAgo(c.updatedat)} วัน | รีพอร์ต: ${(c.report||'ไม่มี').slice(0,80)}`).join('\n');
  }

  async function askAI(){
    if(loading){setAiText('❌ กำลังโหลดข้อมูล กรุณารอสักครู่');setAiDone(true);return;}
    if(tab==='urgent'){await streamAI(`ทีมขายรถยนต์มีเคส active ดังนี้:\n\n${buildUrgentSummary()}\n\nวิเคราะห์:\n1. 🚨 TOP 10 เคสที่ต้องติดตามด่วนที่สุด พร้อมเหตุผล\n2. ⚠️ pattern ที่น่าเป็นห่วง\n3. 💡 คำแนะนำให้ทีม`);}
    else if(tab==='performance'){await streamAI(`สรุปผลงานทีมขาย:\n\n${buildTeamSummary()}\n\nวิเคราะห์:\n1. 🏆 จัดอันดับ performance พร้อมเหตุผล\n2. 💪 จุดแข็งของแต่ละคน\n3. ⚠️ ใครต้องการความช่วยเหลือ\n4. 💡 คำแนะนำสำหรับผู้จัดการ`);}
    else if(tab==='winrate'){const top=cases.filter(c=>['ไปต่อได้','จอง','รอเซ็นต์','รอผล','อนุมัติ'].includes(c.status)).slice(0,40);const prompt=top.map((c,i)=>`${i+1}. [${c.caseid}] ${c.customername} | เซลส์: ${c.sales} | สถานะ: ${c.status} | รีพอร์ต: ${(c.report||'ไม่มี').slice(0,80)}`).join('\n');await streamAI(`เคสที่มีสถานะดี:\n\n${prompt}\n\nประเมิน Win Rate % จัดอันดับจากสูงสุด พร้อมบอกว่าเซลส์คนไหนควรได้รับ support`);}
    else if(tab==='assign'){const teamSummary=buildTeamSummary();const newCases=cases.filter(c=>c.status==='รอข้อมูล'&&daysAgo(c.updatedat)===0).slice(0,20);const newList=newCases.map((c,i)=>`${i+1}. [${c.caseid}] ${c.customername} | ปัจจุบัน: ${c.sales}`).join('\n');await streamAI(`ภาระงานทีม:\n${teamSummary}\n\nเคสใหม่วันนี้:\n${newList||'ไม่มีเคสใหม่'}\n\nแนะนำการ assign เคสใหม่ พร้อมเหตุผล`);}
  }

  const TABS=[['urgent','🚨 เร่งด่วน'],['performance','📊 Performance'],['winrate','🎯 Win Rate ทีม'],['assign','💡 แนะนำ Assign']];

  return <div className="page">
    <div className="page-hd">
      <div><div className="page-title">🧠 AI Admin</div>
        <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{loading?'กำลังโหลด...':`เคส active ${cases.length} ใบ · เซลส์ ${users.length} คน`}</div>
      </div>
      <button className="btn btn-ghost" style={{fontSize:13}} onClick={load}>🔄</button>
    </div>

    {/* ✅ API Key Manager */}
    <ApiKeyManager onKeyReady={setApiKey}/>

    {/* Tabs */}
    <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
      {TABS.map(([k,l])=><button key={k} onClick={()=>{setTab(k);setAiText('');setAiDone(false);}} style={{padding:'7px 14px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,whiteSpace:'nowrap',background:tab===k?'var(--blue2)':'var(--bg3)',color:tab===k?'#fff':'var(--text2)',transition:'all .15s'}}>{l}</button>)}
    </div>

    {/* Stats */}
    {!loading&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,marginBottom:14}}>
      {[['เคส Active',cases.length,'var(--blue)'],['ค้าง >2 วัน',cases.filter(c=>daysAgo(c.updatedat)>=2).length,'var(--yellow)'],['ค้าง >3 วัน',cases.filter(c=>daysAgo(c.updatedat)>=3).length,'var(--red)'],['สถานะดี',cases.filter(c=>['ไปต่อได้','จอง','รอเซ็นต์','รอผล','อนุมัติ'].includes(c.status)).length,'var(--green)']].map(([l,v,c])=>
        <div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>{l}</div>
        </div>
      )}
    </div>}

    {/* Description */}
    {!aiText&&!aiLoading&&<div style={{background:'var(--bg3)',borderRadius:10,padding:'14px',fontSize:13,color:'var(--text2)',lineHeight:1.9,marginBottom:14}}>
      {tab==='urgent'&&<>🚨 <strong>เร่งด่วน</strong> — AI คัด 10 เคสที่ต้องติดตามก่อนจากทั้งทีม</>}
      {tab==='performance'&&<>📊 <strong>Performance</strong> — วิเคราะห์ผลงานเซลส์แต่ละคน จัดอันดับ หาจุดแข็ง/อ่อน</>}
      {tab==='winrate'&&<>🎯 <strong>Win Rate ทีม</strong> — หาเคสที่มีโอกาสปิดสูงทั่วทั้งทีม</>}
      {tab==='assign'&&<>💡 <strong>แนะนำ Assign</strong> — AI แนะนำว่าเคสใหม่ควรให้ใคร ดูจากภาระงาน + performance</>}
    </div>}

    {/* Ask button */}
    {!aiLoading&&(!aiText||aiDone)&&<button
      className="btn btn-primary"
      style={{width:'100%',padding:'13px',fontSize:15,fontWeight:700,borderRadius:10,background:apiKey?'linear-gradient(135deg,#1f6feb,#8250df)':'var(--bg3)',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:apiKey?'#fff':'var(--text3)'}}
      disabled={loading||!apiKey}
      onClick={askAI}>
      <span style={{fontSize:20}}>🧠</span>
      {!apiKey?'ใส่ API Key ก่อนใช้งาน':tab==='urgent'?'วิเคราะห์เคสเร่งด่วนทั้งทีม':tab==='performance'?'วิเคราะห์ Performance ทีม':tab==='winrate'?'หาเคสโอกาสปิดสูงทั่วทีม':'แนะนำการ Assign เคส'}
    </button>}

    {/* Output */}
    {(aiText||aiLoading)&&<div className="card" style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13,color:'var(--purple)',display:'flex',alignItems:'center',gap:6}}>
          🧠 {aiLoading?'AI กำลังวิเคราะห์...':'ผลวิเคราะห์'}
        </div>
        <div style={{display:'flex',gap:6}}>
          {aiLoading&&<button className="btn btn-ghost" style={{fontSize:12,padding:'3px 10px'}} onClick={()=>abortRef.current?.abort()}>หยุด</button>}
          {aiDone&&<button className="btn btn-ghost" style={{fontSize:12,padding:'3px 10px'}} onClick={()=>{setAiText('');setAiDone(false);}}>ล้าง</button>}
        </div>
      </div>
      <div className="ai-stream">{aiText}{aiLoading&&<span className="ai-cursor"/>}</div>
    </div>}
  </div>;
}

// ============================================================
// SALES AI ADVISOR
// ============================================================
function AIAdvisorPage({currentUser}){
  const [cases,setCases]=useState([]);const [claimedCases,setClaimedCases]=useState([]);const [loading,setLoading]=useState(true);const [aiText,setAiText]=useState('');const [aiLoading,setAiLoading]=useState(false);const [aiDone,setAiDone]=useState(false);const [tab,setTab]=useState('recommend');const [scriptCase,setScriptCase]=useState('');const [apiKey,setApiKey]=useState(getAnthropicKey);const abortRef=useRef(null);
  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];

function usePushNotif(apiUrl,salesName){
  const seenRef=useRef(new Set());
  useEffect(()=>{
    if(!salesName||!apiUrl)return;
    var notifPerm='';try{notifPerm=(typeof Notification!=='undefined')?Notification.permission:'';}catch(e){return;}
    try{const s=JSON.parse(localStorage.getItem('cp_seen_notifs')||'[]');seenRef.current=new Set(s);}catch(e){}
    async function poll(){
      var perm='';try{perm=(typeof Notification!=='undefined')?Notification.permission:'';}catch(e){return;}
      if(perm!=='granted')return;
      try{
        const rows=await sbQ('GET','notifications',{'sales':'eq.'+salesName,'สถานะ':'eq.unread',limit:'50'});
        const fresh=safeArray(rows).filter(n=>!seenRef.current.has(n.notifId));
        if(fresh.length>0){
          fresh.forEach(n=>seenRef.current.add(n.notifId));
          try{localStorage.setItem('cp_seen_notifs',JSON.stringify([...seenRef.current]));}catch(e){}
          const body=fresh.length===1?fresh[0].message:fresh.length+' การแจ้งเตือนใหม่';
          try{new Notification('🚗 CasePool',{body,icon:'https://raw.githubusercontent.com/umhomecar03-cmyk/umhomecar/main/do.png',tag:'casepool',renotify:true});}catch(e){}
        }
      }catch(e){}
    }
    window.cpTriggerPushPoll=function(delayMs){setTimeout(poll,delayMs||1500);};var t=setInterval(poll,120000);return function(){clearInterval(t);window.cpTriggerPushPoll=null;};
  },[apiUrl,salesName]);
}

function PushNotifBanner({currentUser}){

function SalesClaimedCases({currentUser,users}){

  useEffect(()=>{load();},[load]);useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t);},[]);
  function parseAssignedAt(s){if(!s)return null;const m=String(s).match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));}

  async function doReturn(caseId){const r=await api('returnCase',{caseId,sales:currentUser.name});if(!r.success){alert(r.error||'ไม่สามารถคืนเคสได้');return;}load();}

function SalesDashboard({currentUser}){

  function parseStartDate(startdate){if(!startdate&&startdate!==0)return null;const s=String(startdate).trim();if(!s)return null;if(/^\d{4,6}$/.test(s)){const d=new Date((parseInt(s)-25569)*86400000);if(!isNaN(d))return d;}if(s.includes('/')){const p=s.split('/');if(p.length>=3){const p0=parseInt(p[0]),p1=parseInt(p[1]),p2=parseInt(p[2]);if(p[2].length===4){const d=new Date(p2,p1-1,p0);if(!isNaN(d))return d;}const d2=new Date(p2,p0-1,p1);if(!isNaN(d2))return d2;}}const d=new Date(s);return isNaN(d)?null:d;}

  const startdate=data?.startdate||currentUser.startdate;const daysWorked=calcDays(startdate);const yearsMonths=daysWorked!=null?(()=>{const y=Math.floor(daysWorked/365),m=Math.floor((daysWorked%365)/30),d=daysWorked%30;if(y>0&&m>0)return`${y} ปี ${m} เดือน`;if(y>0)return`${y} ปี`;if(m>0&&d>0)return`${m} เดือน ${d} วัน`;if(m>0)return`${m} เดือน`;return`${daysWorked} วัน`;})():null;

  const curMonth=months[5];const target=myTarget;const soldNow=curMonth.won;const pct=target>0?Math.min(Math.round(soldNow/target*100),100):0;
